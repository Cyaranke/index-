<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title> Welcome </title>
    <style>
        /* 画面全体 */
        body {
            background-color: #000000; /* 背景 */
            color: #ffffff;            /* 文字色 */
            font-family: "MS PMincho", "Hiragino Mincho ProN", serif; /* 明朝体 */
            text-align: center;        /* すべて中央寄せ */
            padding-top: 15%;          /* 上部の空白 */
            margin: 0;
        }
        h1 {
            font-size: 14pt;           /* 文字サイズ */

        /* カウンター */
        .counter-num {
            font-size: 24pt;
            color: #00ff00; /* 数字色 */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>　ようこそ　</h1>
    
    <p>あなたは <span class="counter-num">000000</span> 人目の来訪者です。</p>

</body>
</html>
