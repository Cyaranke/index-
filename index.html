<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title> Welcome </title>
    <style>
        /* 画面全体 */
        body {
            background-color: #000000; /* 背景 */
            color: #ffffff;            /* 文字色 */
            font-family: "MS PMincho", "Hiragino Mincho ProN", serif; /* 明朝体 */
            text-align: center;        /* すべて中央寄せ */
            padding-top: 15%;          /* 上部の空白 */
            margin: 0;
        }
        h1 {
            font-size: 14pt;           /* 文字サイズ */
            letter-spacing: 4px;       /* 文字の間隔 */
        }

        /* カウンター */
        .counter-num {
            font-size: 24pt;
            color: #00ff00; /* 数字色 */
            font-weight: bold;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>
</head>
<body>

    <h1>　ようこそ　</h1>
    
    <p>あなたは <span class="counter-num" id="count">......</span> 人目の来訪者です。</p>
<script>
    // --- Firebaseの接続設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDq2kVRfXIEC84lbMbVKXyw_I5GhW0fRqM",
        authDomain: "key-ring-9be6a.firebaseapp.com",
        projectId: "key-ring-9be6a",
        storageBucket: "key-ring-9be6a.firebasestorage.app",
        messagingSenderId: "962327150589",
        appId: "1:962327150589:web:00f21bd69ba2bf8b166394",
        measurementId: "G-CLW13PK1PB"
    };
      
    // Firebaseを初期化
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    firebase.analytics(); 
    const counterRef = database.ref('visitor_count');

    // 画面の数字を書き換える共通の処理
    function updateDisplay(count) {
        const zeroPadded = String(count).padStart(6, '0');
        document.getElementById('count').innerText = zeroPadded;
    }

    // --- 同一セッションでのリロード対策 ---
    // ブラウザのメモ帳から「自分の番号」を取り出す
    const myNumber = sessionStorage.getItem('my_visitor_number');

    if (!myNumber) {
        // 【初回訪問の場合】
        // 1. サーバー側でカウントを＋1する
        counterRef.set(firebase.database.ServerValue.increment(1))
            .then(() => {
                // 2. ＋1が完了した後に、サーバーから本物の数字を1回だけ読み込む
                counterRef.once('value', (snapshot) => {
                    const count = snapshot.val() || 0;
                    
                    // 3. ゲットした自分の番号をブラウザのメモ帳に「保存」する
                    sessionStorage.setItem('my_visitor_number', count);
                    
                    // 4. 画面に表示
                    updateDisplay(count);
                });
            });
    } else {
        // 【2回目以降（リロードなど）の場合】
        // サーバーには一切見に行かず、メモ帳に書いてある自分の番号をそのまま出す
        updateDisplay(myNumber);
    }
</script>
</body>
</html>
