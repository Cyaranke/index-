<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title> Welcome </title>
    <style>
        /* 画面全体 */
        body {
            background-color: #000000; /* 背景 */
            color: #ffffff;            /* 文字色 */
            font-family: "MS PMincho", "Hiragino Mincho ProN", serif; /* 明朝体 */
            text-align: center;        /* すべて中央寄せ */
            padding-top: 15%;          /* 上部の空白 */
            margin: 0;
        }
        h1 {
            font-size: 14pt;           /* 文字サイズ */
            letter-spacing: 4px;       /* 文字の間隔 */
        }

        /* カウンター */
        .counter-num {
            font-size: 24pt;
            color: #00ff00; /* 数字色 */
            font-weight: bold;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h1>　ようこそ　</h1>
    
    <p>あなたは <span class="counter-num" id="count">......</span> 人目の来訪者です。</p>
<script>
        // --- 1. Firebaseの接続設定 ---
        // あなたの基地からコピーした「const firebaseConfig = { ... }」の塊を、以下のすぐ下に貼り付けてください

const firebaseConfig = {
  apiKey: "AIzaSyDq2kVRfXIEC84lbMbVKXyw_I5GhW0fRqM",
  authDomain: "key-ring-9be6a.firebaseapp.com",
  projectId: "key-ring-9be6a",
  storageBucket: "key-ring-9be6a.firebasestorage.app",
  messagingSenderId: "962327150589",
  appId: "1:962327150589:web:00f21bd69ba2bf8b166394",
  measurementId: "G-CLW13PK1PB"
};
      
        // Firebaseを初期化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const counterRef = database.ref('visitor_count');

        // --- 2. 同一セッションでのリロード対策 ---
        // ブラウザの「セッションストレージ」を使って、このタブを閉じない限り連打しても増えないようにする
        if (!sessionStorage.getItem('visited')) {
            // 初めて開いた場合のみ、金庫の数字をトランザクション（安全な方法）で+1する
            counterRef.transaction((currentCount) => {
                return (currentCount || 0) + 1;
            });
            // 「もうカウントしたよ」の印をつける
            sessionStorage.setItem('visited', 'true');
        }

        // --- 3. 画面の数字をリアルタイム更新 ---
        // 金庫の数字が変化したら、自動的に画面の「......」をその数字に書き換える
        counterRef.on('value', (snapshot) => {
            const count = snapshot.val() || 0;
            // 古のサイト風に、6桁でゼロ埋め（例: 000005）して表示する
            const zeroPadded = String(count).padStart(6, '0');
            document.getElementById('count').innerText = zeroPadded;
        });
    </script>
</body>
</html>
